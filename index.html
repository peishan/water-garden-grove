<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Garden Grove – Medium Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'Manrope', system-ui, sans-serif;
      --color-bg: #111714;
      --color-surface: #1f2922;
      --color-surface-soft: #263228;
      --color-border: rgba(229,241,232,0.1);
      --color-text: #f6f7ef;
      --color-muted: #9aa594;
      --color-primary: #74c17f;
      --color-primary-soft: rgba(116,193,127,0.18);
      --color-water: #7ac3d9;
      --color-accent: #efb466;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      background: radial-gradient(circle at top, #283727, #111714 55%);
      color: var(--color-text);
    }
    .shell { max-width: 1120px; margin: 0 auto; padding: 1.6rem 1rem 2.6rem; }
    header { display:flex; justify-content:space-between; align-items:flex-start; gap:.9rem; margin-bottom:1.3rem; }
    h1 { font-family: var(--font-display); margin:0; font-size:1.5rem; }
    .sub { font-size:.85rem; color:var(--color-muted); margin-top:.2rem; }
    button {
      font:inherit;
      cursor:pointer;
      border-radius:999px;
      border:1px solid var(--color-border);
      padding:.55rem .95rem;
      background:var(--color-surface-soft);
      color:var(--color-text);
    }
    button.primary { background:var(--color-primary); color:#051208; border-color:var(--color-primary); }
    .grid { display:grid; gap:1rem; }
    @media(min-width:880px){ .grid{ grid-template-columns:1.4fr 1fr; } }
    .card {
      background:var(--color-surface);
      border-radius:1.1rem;
      border:1px solid var(--color-border);
      padding:1.1rem 1.2rem;
    }
    .label {
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--color-muted);
    }
    .meter { margin-top:.6rem; height:14px; border-radius:999px; background:#253338; overflow:hidden; }
    .meter-fill { height:100%; width:0%; background:linear-gradient(90deg, var(--color-water), #a3e1f1); }
    .buttons { display:flex; flex-wrap:wrap; gap:.55rem; margin-top:.8rem; }
    .stat { font-size:.9rem; color:var(--color-muted); margin-top:.25rem; }
    .pill-row { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:.7rem; }
    .chip {
      border-radius:999px;
      padding:.35rem .75rem;
      font-size:.78rem;
      border:1px solid var(--color-border);
      background:var(--color-surface-soft);
      color:var(--color-muted);
    }
    .chip.active { background:var(--color-primary-soft); color:var(--color-primary); border-color:var(--color-primary); }
    .plants { display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.75rem; }
    .tag {
      font-size:.78rem;
      padding:.3rem .6rem;
      border-radius:999px;
      background:rgba(255,255,255,0.05);
      border:1px solid var(--color-border);
    }
    .garden-row {
      margin-top:1rem;
      padding:.8rem .75rem;
      border-radius:.9rem;
      background:var(--color-surface-soft);
    }
    .garden-days { display:flex; justify-content:space-between; gap:.3rem; margin-top:.45rem; }
    .day { flex:1; text-align:center; font-size:.75rem; color:var(--color-muted); }
    .day-plant { font-size:1.1rem; display:block; margin-bottom:.1rem; }
    .toast {
      position:fixed;
      left:50%;
      bottom:1rem;
      transform:translate(-50%,150%);
      background:#0e1511;
      border-radius:999px;
      border:1px solid var(--color-border);
      padding:.6rem .95rem;
      font-size:.85rem;
      box-shadow:0 12px 32px rgba(0,0,0,0.45);
      transition:transform .18s ease;
      z-index:20;
    }
    .toast.show { transform:translate(-50%,0); }
    .legend { margin-top:.5rem; font-size:.8rem; color:var(--color-muted); display:flex; flex-wrap:wrap; gap:.6rem; }
    .legend span { display:flex; align-items:center; gap:.2rem; }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div>
        <h1>Water Garden Grove</h1>
        <div class="sub">2,000 ml goal · Pattern mug · Big mug · Tumbler · Bedroom & Patio bases</div>
      </div>
      <div style="display:flex;gap:.55rem;flex-wrap:wrap;">
        <button id="closeDayBtn">Close day</button>
        <button id="startTomorrowBtn" class="primary">Start tomorrow</button>
      </div>
    </header>

    <div class="grid">
      <section class="card" aria-label="Water tracker">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
          <div>
            <div class="label">Today</div>
            <div id="waterText" style="font-weight:700;margin-top:.1rem;">0 / 2000 ml</div>
          </div>
          <div style="text-align:right;">
            <div class="label">Streak</div>
            <div id="streakText" style="font-weight:700;">0 days</div>
          </div>
        </div>
        <div class="meter" aria-hidden="true"><div class="meter-fill" id="meterFill"></div></div>
        <div class="stat" id="encText">Start with one drink and wake the garden.</div>
        <div class="buttons" aria-label="Log water">
          <button data-water="350">Pattern mug (350 ml)</button>
          <button data-water="400">Big mug (400 ml)</button>
          <button class="primary" data-water="500">Tumbler (500 ml)</button>
        </div>
      </section>

      <section class="card" aria-label="Coffee and base">
        <div class="label">Coffee</div>
        <div id="coffeeText" style="font-weight:700;margin-top:.1rem;">0 / 4 cups</div>
        <div class="buttons" aria-label="Log coffee"><button id="coffeeBtn">☕ + coffee</button></div>
        <div class="label" style="margin-top:.9rem;">Home base</div>
        <div class="pill-row">
          <button class="chip active" data-base="bedroom">Bedroom</button>
          <button class="chip" data-base="patio">Patio</button>
        </div>
        <div class="label" style="margin-top:.75rem;">Visible plants</div>
        <div class="plants" id="plantTags"></div>
      </section>
    </div>

    <section class="card" style="margin-top:1rem;" aria-label="Weekly garden">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:.75rem;">
        <div>
          <div class="label">Garden insights</div>
          <div style="font-weight:700;margin-top:.1rem;" id="weekSummary">Last 7 days</div>
        </div>
        <div class="stat" id="goalDaysText">0 / 7 bloom days</div>
      </div>
      <div class="garden-row">
        <div class="label">Week</div>
        <div class="garden-days" id="gardenDays"></div>
        <div class="legend">
          <span><span>🫘</span>0%</span>
          <span><span>🌱</span>&gt;0–49%</span>
          <span><span>🌿</span>50–89%</span>
          <span><span>🌸</span>≥90% of 2000 ml</span>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'water_garden_grove_medium_v1';
    const todayStr = () => new Date().toISOString().slice(0,10);

    const initialState = {
      goal: 2000,
      water: 0,
      coffee: 0,
      base: 'bedroom',
      streak: 0,
      history: []
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...initialState };
        const parsed = JSON.parse(raw);
        return { ...initialState, ...parsed };
      } catch { return { ...initialState }; }
    }

    let state = loadState();

    const meterFill = document.getElementById('meterFill');
    const waterText = document.getElementById('waterText');
    const encText = document.getElementById('encText');
    const coffeeText = document.getElementById('coffeeText');
    const streakText = document.getElementById('streakText');
    const plantTags = document.getElementById('plantTags');
    const gardenDays = document.getElementById('gardenDays');
    const weekSummary = document.getElementById('weekSummary');
    const goalDaysText = document.getElementById('goalDaysText');
    const toast = document.getElementById('toast');

    const bedroomPlants = [
      'Stillwater Guardian (Sansevieria)',
      'Glass Jar Muse (Begonia cutting)'
    ];
    const patioPlants = [
      'Trailblazer Vine (Golden Pothos)',
      'Patio Spark (Wild Mint)',
      'Umbrella Plant',
      'Hoya australis Lisa'
    ];

    function pct() { return Math.min((state.water / state.goal) * 100, 100); }
    function enc() {
      const p = pct();
      if (!p) return 'Start with one drink and wake the garden.';
      if (p < 25) return 'Nice start. The first leaves are lifting.';
      if (p < 50) return 'Halfway to leafy. Keep the rhythm.';
      if (p < 90) return 'Strong day. One or two more mugs does it.';
      return 'Goal reached. Your garden is glowing today.';
    }
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 1600);
    }
    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }

    function renderPlants() {
      plantTags.innerHTML = '';
      const list = state.base === 'bedroom' ? bedroomPlants : patioPlants;
      list.forEach(name => {
        const span = document.createElement('div');
        span.className = 'tag';
        span.textContent = name;
        plantTags.appendChild(span);
      });
    }

    function stageFromPct(p) {
      if (p >= 0.9) return 'bloom';
      if (p >= 0.5) return 'leaf';
      if (p > 0) return 'sprout';
      return 'seed';
    }

    function renderHistory() {
      const today = new Date();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0,10);
        const entry = state.history.find(h => h.date === key);
        days.push({ date: key, value: entry ? entry.water : 0 });
      }
      gardenDays.innerHTML = '';
      const weekday = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      let goalDays = 0;
      days.forEach(d => {
        const dt = new Date(d.date);
        const p = Math.min(d.value / state.goal, 1);
        const stage = stageFromPct(p);
        if (stage === 'bloom') goalDays++;
        const div = document.createElement('div');
        div.className = 'day';
        const icon = document.createElement('span');
        icon.className = 'day-plant';
        icon.textContent = stage === 'bloom' ? '🌸' :
                            stage === 'leaf' ? '🌿' :
                            stage === 'sprout' ? '🌱' : '🫘';
        const label = document.createElement('div');
        label.textContent = weekday[dt.getDay()];
        div.appendChild(icon);
        div.appendChild(label);
        gardenDays.appendChild(div);
      });
      goalDaysText.textContent = goalDays + ' / 7 bloom days';
      weekSummary.textContent = 'Last 7 days · goal 2000 ml';
    }

    function render() {
      meterFill.style.width = pct() + '%';
      waterText.textContent = state.water + ' / ' + state.goal + ' ml';
      encText.textContent = enc();
      coffeeText.textContent = state.coffee + ' / 4 cups';
      streakText.textContent = state.streak + ' days';
      renderPlants();
      renderHistory();
      document.querySelectorAll('[data-base]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.base === state.base);
      });
    }

    document.querySelectorAll('[data-water]').forEach(btn => {
      btn.addEventListener('click', () => {
        const ml = Number(btn.dataset.water);
        state.water = Math.min(state.water + ml, state.goal + 1000);
        saveState();
        render();
        showToast('Logged ' + ml + ' ml');
      });
    });

    document.getElementById('coffeeBtn').addEventListener('click', () => {
      if (state.coffee < 4) state.coffee += 1;
      saveState();
      render();
      showToast('Coffee: ' + state.coffee + ' / 4');
    });

    document.querySelectorAll('[data-base]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.base = btn.dataset.base;
        saveState();
        render();
        showToast((state.base === 'bedroom' ? 'Bedroom' : 'Patio') + ' base active');
      });
    });

    document.getElementById('closeDayBtn').addEventListener('click', () => {
      showToast('Day closed. Tap Start tomorrow to log a new day.');
    });

    document.getElementById('startTomorrowBtn').addEventListener('click', () => {
      const today = todayStr();
      const existing = state.history.find(h => h.date === today);
      if (existing) {
        existing.water = state.water;
        existing.coffee = state.coffee;
      } else {
        state.history.push({ date: today, water: state.water, coffee: state.coffee });
      }
      state.history = state.history.sort((a,b) => a.date.localeCompare(b.date)).slice(-14);
      const pctToday = state.water / state.goal;
      if (pctToday >= 0.8) state.streak += 1;
      else state.streak = 0;
      state.water = 0;
      state.coffee = 0;
      saveState();
      render();
      showToast('New day started. Streak: ' + state.streak + ' days');
    });

    render();
  </script>
</body>
</html>
